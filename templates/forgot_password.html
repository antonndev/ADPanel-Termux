<!DOCTYPE html>
<head>
  <title>Forgot password?</title>
  <link
    id="favicon"
    rel="icon"
    type="image/png"
    href="/images/adpanel-dark.png"
  />
  <style>
    strong {
      background-color: gray;
      color: white;
    }
  </style>

  <script>
    const darkFavicon = "/images/adpanel-white.png";
    const lightFavicon = "/images/adpanel-dark.png";

    const darkApple = "/images/adpanel-white.png";
    const lightApple = "/images/adpanel-dark.png";
    function updateIcons() {
      const isDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

      document
        .querySelectorAll('link[rel="icon"], link[rel="apple-touch-icon"]')
        .forEach((el) => el.remove());

      const linkFavicon = document.createElement("link");
      linkFavicon.rel = "icon";
      linkFavicon.type = "image/png";
      linkFavicon.href = isDark ? darkFavicon : lightFavicon;
      document.head.appendChild(linkFavicon);

      const linkApple = document.createElement("link");
      linkApple.rel = "apple-touch-icon";
      linkApple.type = "image/png";
      linkApple.href = isDark ? darkApple : lightApple;
      document.head.appendChild(linkApple);
    }

    updateIcons();

    window
      .matchMedia("(prefers-color-scheme: dark)")
      .addEventListener("change", updateIcons);
  </script>
</head>
<body>
  <html>
    <p>
      To reset your password, enter your email, new password, and verify with your 2FA code.
      Alternatively, you can reset from the terminal using
      <strong>bash initialize.sh</strong> from the adsetups directory.
    </p>
    <form method="POST" action="/forgot-password" style="max-width:400px;margin:20px auto;">
      <div style="margin-bottom:10px;">
        <label>Email:</label><br>
        <input type="email" name="email" required style="width:100%;padding:8px;box-sizing:border-box;">
      </div>
      <div style="margin-bottom:10px;">
        <label>New Password (min 8 chars):</label><br>
        <input type="password" name="newPassword" required minlength="8" style="width:100%;padding:8px;box-sizing:border-box;">
      </div>
      <div style="margin-bottom:10px;">
        <label>2FA Code:</label><br>
        <input type="text" name="code" required pattern="[0-9]{6}" placeholder="6-digit code" style="width:100%;padding:8px;box-sizing:border-box;">
      </div>
      <button type="submit" style="padding:10px 20px;">Reset Password</button>
    </form>
    {% if error %}
      <p style="color:red;text-align:center;">{{ error }}</p>
    {% endif %}
    {% if success %}
      <p style="color:green;text-align:center;">{{ success }}</p>
    {% endif %}
  </html>
</body>
